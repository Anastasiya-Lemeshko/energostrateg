<section class="steps block">
  <div class="container">
    <h2 class="title">Как мы работаем</h2>
    <div class="steps__swiper-container">
      <div class="steps__swiper" data-swiper="navigation">
        <ul class="steps__swiper-wrapper steps__swiper-wrapper--counter steps__swiper-wrapper--steps">
          <li class="steps__slide">
            <div class="steps__card">
              <p class="steps__text">Вы&nbsp;оставляете заявку</p>
            </div>
          </li>
          <li class="steps__slide">
            <div class="steps__card">
              <p class="steps__text">Уточняем параметры объекта</p>
            </div>
          </li>
          <li class="steps__slide">
            <div class="steps__card">
              <p class="steps__text">Анализируем условия эксплуатации</p>
            </div>
          </li>
          <li class="steps__slide">
            <div class="steps__card">
              <p class="steps__text">Подбираем подходящие варианты</p>
            </div>
          </li>
          <li class="steps__slide">
            <div class="steps__card">
              <p class="steps__text">Объясняем различия и&nbsp;рекомендуем оптимальное решение</p>
            </div>
          </li>
        </ul>
        <div class="steps__swiper-button-container hidden">
          <button class="button-swiper button-swiper--prev" type="button">
            <span class="visually-hidden">Назад.</span>
          </button>
          <button class="button-swiper button-swiper--next" type="button">
            <span class="visually-hidden">Вперёд.</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
