<div class="page-header">
  <div class="container">
    <h1 class="title title--h1">@h1</h1>
    <ol class="breadcrumbs">
      <li class="breadcrumbs__item">
        <a class="breadcrumbs__link" href="index.html">Главная</a>
      </li>
      @if (typeof secondLink !== 'undefined') {
      <li class="breadcrumbs__item">
        @secondLink
      </li>
      }
      @if (typeof thirdLink !== 'undefined') {
      <li class="breadcrumbs__item">
        @thirdLink
      </li>
      }
      <li class="breadcrumbs__item">
        <span class="breadcrumbs__link">@lastLink</span>
      </li>
    </ol>
  </div>
</div>
